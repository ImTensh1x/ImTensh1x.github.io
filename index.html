<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Chat Clone</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">A</div>
        <div class="chat-info">
            <div class="title">Akatsuki</div>
            <div class="members">36 участников</div>
        </div>
    </div>

    <div class="pinned-message">
        <div class="pinned-title">Закреплённое сообщение</div>
        <div class="pinned-text">Осеменить шикамару = ❤️</div>
    </div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input-bar">
        <input type="text" class="chat-input" placeholder="Сообщение">
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
